version: 1

defaults:
  max_conn_per_host: 5
  max_parallel_hosts: 50
  timeout: 3s
  delay: 0s
  output: pretty
  user_agent: "Mozilla/5.0 (compatible; KiteString/1.0)"
  wordlists:
    - ~/.cache/kitestring/wordlists/apiroutes.ks
  fail_status_codes: [400, 401, 404, 403, 501, 502]
  quarantine_threshold: 10
  similarity_threshold: 0.85

profiles:
  hackerone-stripe:
    scope_file: ~/bounty/stripe/scope.txt
    wordlists:
      - ~/.cache/kitestring/wordlists/apiroutes.ks
      - ~/bounty/stripe/custom-routes.ks
    openapi_url: https://raw.githubusercontent.com/stripe/openapi/master/openapi/spec3.json
    max_conn_per_host: 3
    delay: 200ms
    fail_status_codes: [400, 404, 403]
    output: jsonl
    report: md

  bugcrowd-generic:
    max_conn_per_host: 2
    delay: 500ms
    wordlists:
      - ~/.cache/kitestring/wordlists/apiroutes.ks
      - ~/.cache/kitestring/wordlists/sl-api-endpoints.ks
