version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ks
    main: ./cmd/ks
    binary: ks
    ldflags:
      - -s -w
      - -X github.com/RowanDark/kitestring/internal/cli.Version={{.Version}}
      - -X github.com/RowanDark/kitestring/internal/cli.Commit={{.Commit}}
      - -X github.com/RowanDark/kitestring/internal/cli.BuildDate={{.Date}}
      - -X github.com/RowanDark/kitestring/internal/cli.BuiltBy=goreleaser
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Performance"
      regexp: "^perf"
      order: 2
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: RowanDark
    name: kitestring
  draft: false
  prerelease: auto
  name_template: "KiteString {{.Version}}"
