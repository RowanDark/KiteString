name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race

  release:
    name: GoReleaser
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  wordlists-release:
    name: Publish wordlists
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ks binary
        run: go build -o bin/ks ./cmd/ks

      - name: Update manifest checksums
        run: |
          tag="${{ github.ref_name }}"
          manifest="wordlists/manifest.json"

          # Update the manifest updated_at field and asset base URL
          python3 - <<'EOF'
          import json, sys, datetime

          with open("wordlists/manifest.json") as f:
              m = json.load(f)

          tag = sys.argv[1]
          base = f"https://github.com/RowanDark/kitestring/releases/download/{tag}/"
          m["updated_at"] = datetime.date.today().isoformat()

          for wl in m.get("wordlists", []):
              wl["url"] = base + wl["filename"]

          with open("wordlists/manifest.json", "w") as f:
              json.dump(m, f, indent=2)
              f.write("\n")
          EOF
          python3 wordlists/manifest.json "$tag"
        continue-on-error: true

      - name: Upload manifest to wordlists-latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Re-create the wordlists-latest tag pointing to this commit
          gh release delete wordlists-latest --yes 2>/dev/null || true
          gh release create wordlists-latest \
            --title "Wordlists (latest)" \
            --notes "Curated KiteString wordlists. Updated on every release." \
            --latest=false \
            wordlists/manifest.json
